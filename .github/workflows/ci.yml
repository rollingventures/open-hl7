name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  adapter-openemr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/openemr/oe-module-hl7-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer install --no-interaction --no-progress
      - name: Unit tests
        run: vendor/bin/phpunit --testsuite unit
      - name: Integration test (adapter -> hub)
        run: tests/run-integration.sh
